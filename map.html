<!doctype html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hệ hỗ trợ chọn địa điểm kinh doanh - Bản đồ</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css" />
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body class="map-page">

  <!-- Full-screen Map -->
  <main id="map"></main>

  <!-- ── Floating Sidebar ── -->
  <aside class="map-sidebar" id="mapSidebar">
    <!-- Sidebar Toggle Button -->
    <button class="sidebar-toggle" id="sidebarToggle" title="Ẩn/Hiện bảng điều khiển">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="6" x2="21" y2="6" />
        <line x1="3" y1="12" x2="21" y2="12" />
        <line x1="3" y1="18" x2="21" y2="18" />
      </svg>
    </button>

    <!-- Header -->
    <div class="map-sidebar-header">
      <div class="map-sidebar-logo">
        <div class="map-logo-icon">🗺️</div>
        <div>
          <div class="map-logo-title">AHP <span>Map</span></div>
          <div class="map-logo-sub">Phân tích địa điểm</div>
        </div>
      </div>
      <a href="dashboard.html" class="map-back-btn" title="Quay lại Dashboard">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15,18 9,12 15,6" />
        </svg>
        Dashboard
      </a>
    </div>

    <!-- Stats -->
    <div class="map-stats">
      <div class="map-stat-card">
        <div class="map-stat-label">Địa điểm</div>
        <div id="total-locations" class="map-stat-value">0</div>
      </div>
    </div>

    <!-- Compare overlay -->
    <div id="compare-overlay" class="map-compare-panel" style="display:none">
      <div class="map-compare-header">
        <span class="map-compare-title">🔁 So sánh địa điểm</span>
        <button type="button" class="map-panel-close" id="compareCloseBtn">×</button>
      </div>
      <div id="locationCompareResult"></div>
    </div>

    <!-- Legend -->
    <div class="map-legend">
      <div class="map-legend-title">Chú thích bản đồ</div>
      <div id="legend-list"></div>
    </div>
  </aside>

  <!-- ── Sidebar Close Button (outside sidebar when hidden) ── -->
  <button class="sidebar-open-btn hidden" id="sidebarOpenBtn" title="Mở bảng điều khiển">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
      stroke-linecap="round" stroke-linejoin="round">
      <line x1="3" y1="6" x2="21" y2="6" />
      <line x1="3" y1="12" x2="21" y2="12" />
      <line x1="3" y1="18" x2="21" y2="18" />
    </svg>
  </button>

  <!-- ── Criteria Panel (floating center) ── -->
  <div id="criteriaPanel" class="criteria-float-panel hidden" style="display:none">
    <div class="criteria-form-header">
      <h4>📊 Tiêu chí đánh giá</h4>
      <span onclick="closeCriteriaPanel()" class="criteria-close">&times;</span>
    </div>
    <div class="criteria-form-body">
      <div style="font-size:12px; color:#64748b; margin-bottom:10px;">
        Kéo thanh để so sánh mức quan trọng (1–9). Bấm <b>Áp dụng</b> để cập nhật bản đồ.
      </div>
      <div id="criteriaListAHP" class="criteria-list"></div>
      <div class="center" style="margin-top:12px">
        <button class="btn" id="applyAHPBtn" style="width:100%; background: linear-gradient(135deg,#6366f1,#3b82f6);">
          ✅ Áp dụng tiêu chí
        </button>
      </div>
      <div id="criteriaCompareResult" style="margin-top:12px"></div>
    </div>
  </div>

  <!-- ── Satellite View Modal ── -->
  <div id="streetview-modal" class="streetview-modal hidden">
    <div class="streetview-header">
      <h3 id="streetview-title">Bản đồ vệ tinh 3D</h3>
      <button id="streetview-close" class="streetview-close-btn">×</button>
    </div>
    <div id="streetview-container"></div>
  </div>
  <div id="streetview-backdrop" class="streetview-backdrop hidden"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://unpkg.com/@popperjs/core@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
  <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
  <script src="js/api.js"></script>
  <script src="js/map.js"></script>
  <script src="js/chatbot.js"></script>
  <script>
    // ── Sidebar Toggle ──
    const sidebar = document.getElementById('mapSidebar');
    const toggleBtn = document.getElementById('sidebarToggle');
    const openBtn = document.getElementById('sidebarOpenBtn');
    const compareCloseBtn = document.getElementById('compareCloseBtn');

    toggleBtn.addEventListener('click', () => {
      sidebar.classList.add('hidden');
      openBtn.classList.remove('hidden');
    });
    openBtn.addEventListener('click', () => {
      sidebar.classList.remove('hidden');
      openBtn.classList.add('hidden');
    });

    if (compareCloseBtn) {
      compareCloseBtn.addEventListener('click', () => {
        document.getElementById('compare-overlay').style.display = 'none';
      });
    }
  </script>
</body>

</html>
